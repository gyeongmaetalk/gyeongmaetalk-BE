# default profile
spring:
  application:
    name: gyeongmaetalk-server
  profiles:
    group:
      dev: common, dev
---
spring:
  profiles:
    active: dev
  servlet:
    multipart:
      maxFileSize: 10MB
      maxRequestSize: 20MB
      enabled: true
---
spring:
  config:
    activate:
      on-profile: "common"
springdoc:
  swagger-ui:
    tags-sorter: alpha            # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
    operations-sorter: alpha      # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
  cache:
    disabled: true
  use-fqn: true
---
logging:
  level:
    org.springframework.security.web.FilterChainProxy: DEBUG
spring:
  application:
    name: auctiontalk-server-dev
  config:
    activate:
      on-profile: "dev"
  datasource:
    username: ${AWS_DB_USERNAME}
    password: ${AWS_DB_PASSWORD}
    url: ${AWS_DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: false
        format_sql: false
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000
jwt:
  header: Authorization
  # dev server
  secret:
    key: ${JWT_SECRET}
  #  secret : ${JWT_SECRET}
  authorities-key: authoritiesKey
  access-token-validity-in-seconds: 30000 # 15 days
  refresh-token-validity-in-seconds: 5184000000 # 60 days

firebase:
  admin-sdk: ${FCM_KEY}

oauth:
  kakao:
    baseUrl: ${KAKAO_BASE_URL}
    clientId: ${KAKAO_CLIENT_ID}
    redirectUrl : ${KAKAO_REDIRECT_URL}
    secretKeyREST: ${KAKAO_SECRET_REST}
  google:
    baseUrl : ${GOOGLE_BASE_URL}
    apiKey : ${GOOGLE_API_KEY}


cloud:
  aws:
    lambda:
      url : ${AWS_PRESIGNED_LAMBDA}
    s3:
      bucket: elasticbeanstalk-ap-northeast-2-851725177732
      #s3 bucket
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false
    credentials:
      access-key: ${ACCESS_KEY}
      secret-key: ${SECRET_KEY}
  #aws access key, secret key
---
spring:
  application:
    name: tree-server-local
  config:
    activate:
      on-profile: "local"
  datasource:
    username: root
    password: 1234
    url: jdbc:mysql://localhost:3306/auction
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port : 6379
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: true
        format_sql: true
        use_sql_comments: true\
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000
jwt:
  header: Authorization
  # dev server
  secret:
    key: secretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecret
  #  secret : ${JWT_SECRET}
  authorities-key: authoritiesKey
  access-token-validity-in-seconds: 3000 # 15 days
  refresh-token-validity-in-seconds: 1200000 # 60 days
oauth:
  kakao:
    baseUrl: ${KAKAO_BASE_URL}
    clientId: ${KAKAO_REST_KEY}
    redirectUrl : ${KAKAO_REDIRECT_URL}
    secretKeyREST: ${KAKAO_SECRET_REST}
  google:
    baseUrl : ${GOOGLE_BASE_URL}
    detailsUrl : ${GOOGLE_DETAIL_URL}
    apiKey : ${GOOGLE_API_KEY}
    lang : ko
    rankBy : distance

